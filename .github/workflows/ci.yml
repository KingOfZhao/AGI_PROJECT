# AGI v13.3 Cognitive Lattice - CI/CD Pipeline
# 对应维度45-46: CI/CD管道自动化构建 + GitHub Actions工作流集成

name: AGI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff black isort mypy

      - name: Run ruff (lint)
        run: ruff check . --output-format=github

      - name: Check black formatting
        run: black --check --diff .

      - name: Check import sorting
        run: isort --check-only --diff .

  # ==================== 安全扫描 ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit (SAST)
        run: bandit -r . -x ./venv,./workspace/skills -f json -o bandit-report.json || true

      - name: Check dependencies for vulnerabilities
        run: safety check --output json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json

  # ==================== 单元测试 ====================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          AGI_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ==================== Docker构建 ====================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agi-cognitive-lattice:latest .

      - name: Test Docker health
        run: |
          docker run -d --name agi-test -p 5001:5000 agi-cognitive-lattice:latest
          sleep 10
          curl -f http://localhost:5001/api/health || exit 1
          docker stop agi-test
